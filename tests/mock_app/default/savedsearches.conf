[default]
dispatch.earliest_time = -24h
dispatch.latest_time = now

[Brute Force - Failed Logins by User]
search = index=security sourcetype=linux_secure action=failure | stats count as failure_count by user, src_ip | where failure_count > 10 | sort -failure_count
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_scheduled = 1
cron_schedule = */15 * * * *
alert_type = number of events
alert_condition = search count > 0

[Brute Force - Account Lockouts]
search = index=wineventlog EventCode=4740 | stats count by TargetUserName, SubjectUserName, src_ip | where count > 3

[Credential Stuffing - Multiple Accounts Single IP]
search = index=security action=failure | stats dc(user) as unique_users count by src_ip | where unique_users > 5 | sort -unique_users

[Lateral Movement - SMB Connections]
search = index=wineventlog EventCode=5145 | stats count dc(dest_ip) as unique_targets by src_ip user | where unique_targets > 10

[Privilege Escalation - New Admin Account]
search = index=wineventlog EventCode=4728 OR EventCode=4732 | eval group=if(EventCode==4728,"Domain Admins","Local Admins") | stats count by user group src_ip

[Data Exfiltration - Large Outbound Transfer]
search = index=network sourcetype=cisco_asa | where bytes_out > 100000000 | stats sum(bytes_out) as total_bytes by src_ip dest_ip | sort -total_bytes

[Malware - Suspicious Process Execution]
search = index=sysmon EventCode=1 | where match(CommandLine, "(?i)(powershell|cmd|wscript|cscript).*(http|ftp|download|wget|curl)") | stats count by Computer CommandLine ParentCommandLine

[Phishing - Suspicious Email Attachment]
search = index=email sourcetype=exchange | where isnotnull(attachment) | eval is_suspicious=if(match(attachment,"(?i)\.(exe|bat|ps1|vbs|js|jar)$"),1,0) | where is_suspicious=1

[Ransomware - Mass File Modification]
search = index=sysmon EventCode=11 | stats count as file_events dc(TargetFilename) as unique_files by Computer | where file_events > 500 | sort -file_events

[Network Recon - Port Scan Detection]
search = index=network sourcetype=cisco_asa | stats dc(dest_port) as ports_scanned count by src_ip | where ports_scanned > 50 | sort -ports_scanned

[AWS - Unauthorized API Calls]
search = index=aws sourcetype=aws:cloudtrail errorCode=AccessDenied | stats count by userIdentity.arn eventName awsRegion | sort -count

[AWS - New IAM User Created]
search = index=aws sourcetype=aws:cloudtrail eventName=CreateUser | eval actor=mvindex(userIdentity.arn,0) | table _time actor requestParameters.userName awsRegion

[AWS - Security Group Modified]
search = index=aws sourcetype=aws:cloudtrail (eventName=AuthorizeSecurityGroupIngress OR eventName=AuthorizeSecurityGroupEgress) | table _time userIdentity.userName requestParameters.groupId requestParameters.ipPermissions

[Windows - PowerShell Script Block Logging]
search = index=wineventlog EventCode=4104 | where match(ScriptBlockText,"(?i)(invoke-mimikatz|invoke-expression|iex|downloadstring|webclient|base64)") | stats count by Computer user ScriptBlockText

[Windows - Service Installation]
search = index=wineventlog EventCode=7045 | table _time ComputerName ServiceName ServiceFileName ServiceType ServiceStartType

[Network - DNS Tunneling Detection]
search = index=network sourcetype=stream:dns | eval query_len=len(query) | stats count avg(query_len) as avg_len max(query_len) as max_len dc(query) as unique_queries by src_ip | where avg_len > 50 OR unique_queries > 1000

[Authentication - Successful Login After Failures]
search = index=security | eventstats count(eval(action="failure")) as fail_count count(eval(action="success")) as succ_count by user src_ip | where fail_count > 5 AND succ_count > 0 | table user src_ip fail_count succ_count

[Endpoint - USB Device Connected]
search = index=wineventlog EventCode=6416 | table _time ComputerName ClassName ClassGuid HardwareIDs

[Cloud - S3 Bucket Made Public]
search = index=aws sourcetype=aws:cloudtrail eventName=PutBucketAcl | eval acl=spath(_raw,"requestParameters.AccessControlPolicy.AccessControlList.Grant{}.Grantee.URI") | where match(acl,"AllUsers|AuthenticatedUsers")

[Insider Threat - Off Hours Access]
search = index=security action=success | eval hour=strftime(_time,"%H") | where hour < 6 OR hour > 22 | stats count by user src_ip | sort -count

[Compliance - PCI DSS Failed Login Audit]
search = index=security sourcetype=linux_secure action=failure | bucket _time span=1d | stats count as daily_failures by _time user | where daily_failures > 50

[Web Attack - SQL Injection Attempt]
search = index=web sourcetype=access_combined | where match(uri_query,"(?i)(union|select|insert|drop|delete|update|exec|xp_cmdshell|waitfor|benchmark)") | stats count by clientip uri_path

[Web Attack - XSS Attempt]
search = index=web sourcetype=access_combined | where match(uri_query,"(?i)(<script|javascript:|onerror|onload|alert\()") | stats count by clientip uri_path

[Identity - Service Account Used Interactively]
search = index=wineventlog EventCode=4624 LogonType=2 | where match(TargetUserName,"(?i)(svc_|service|svc-)") | table _time ComputerName TargetUserName IpAddress

[Threat Intel - Known Bad IP Connection]
search = index=network | lookup threat_intel_ips ip as dest_ip OUTPUT is_malicious threat_category | where is_malicious=1 | stats count by src_ip dest_ip threat_category
