[auth_failures(1)]
args = user
definition = index=security sourcetype=linux_secure action=failure user=$user$ | stats count by src_ip

[web_attack_filter]
definition = sourcetype=access_combined (status=400 OR status=403 OR status=500)

[time_window(2)]
args = earliest,latest
definition = earliest=$earliest$ latest=$latest$

[sensitive_users]
definition = (user=root OR user=admin OR user=administrator OR match(user,"(?i)svc_"))

[high_severity_events]
definition = (severity=critical OR severity=high OR priority=1 OR priority=2)

[network_baseline(1)]
args = src_ip
definition = index=network src_ip=$src_ip$ | stats avg(bytes_out) as avg_bytes by dest_port

[cloud_admin_filter]
definition = index=aws (userIdentity.type=Root OR match(userIdentity.arn,"(?i)admin"))
